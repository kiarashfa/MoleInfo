<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Molecule Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 400px;
      text-align: center;
    }

    input {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      text-align: left;
      word-wrap: break-word;
    }

    .loading {
      color: orange;
    }

    .error {
      color: red;
    }

    .success {
      color: green;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Molecular Calculator</h2>

  <input id="name" placeholder="Enter molecule name (e.g. styrene)">
  <br>
  <button onclick="compute()">Compute</button>

  <div id="status"></div>
  <div id="result"></div>
</div>

<script>
async function compute() {
  const name = document.getElementById("name").value.trim();
  const status = document.getElementById("status");
  const result = document.getElementById("result");

  if (!name) {
    status.innerHTML = "<p class='error'>Please enter a molecule name</p>";
    return;
  }

  status.innerHTML = "<p class='loading'>Computing...</p>";
  result.innerHTML = "";

  try {
    const response = await fetch(
      `https://kiarashfa.pythonanywhere.com/compute?name=${encodeURIComponent(name)}`
    );

    const data = await response.json();

    if (data.error) {
      status.innerHTML = "<p class='error'>Error</p>";
      result.innerHTML = `<p>${data.error}</p>`;
      return;
    }

    status.innerHTML = "<p class='success'>Success</p>";

    result.innerHTML = `
      <p><strong>Name:</strong> ${data.name}</p>
      <p><strong>Canonical SMILES:</strong> ${data.smiles}</p>
      <p><strong>Molar Mass:</strong> ${data.molar_mass.toFixed(2)} g/mol</p>
    `;

  } catch (err) {
    status.innerHTML = "<p class='error'>Request failed</p>";
    result.innerHTML = `<p>${err}</p>`;
  }
}
</script>

</body>
</html>
